name: FDA Drug Approval Monitor

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: 安装Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: 安装依赖
      run: pip install feedparser requests

    - name: 运行FDA监控脚本
      env:
        GMAIL_USER: ${{ secrets.GMAIL_USER }}
        GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
      run: python fda_monitor.py

    - name: 提交已发送记录
      run: |
        git config user.name "FDA Bot"
        git config user.email "bot@github.com"
        git add sent_drugs.json
        git diff --staged --quiet || git commit -m "更新记录 $(date)"
        git push
